<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mizan — Profile</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />

  <style>
    body { background: var(--color-bg); }
    .page-header {
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      height: 81px;
      display: flex;
      align-items: center;
      padding: 0 235.5px;
    }
    .page-header__title {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 24px;
      color: var(--color-text-heading);
    }
    .page-content {
      max-width: 672px;
      margin: 0 auto;
      padding: 32px 24px 100px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .profile-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-sm);
      padding: 25px;
    }
    .identity-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .profile-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--color-primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .identity-name {
      font-family: var(--font-display);
      font-size: 20px;
      color: var(--color-text-heading);
    }
    .identity-email {
      font-size: 14px;
      color: var(--color-text-muted);
    }

    .inline-banner {
      font-size: 13px;
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      display: none;
      margin-top: 8px;
    }
    .inline-banner.error   { display: block; background: var(--color-error-bg); }
    .inline-banner.success { display: block; background: var(--color-success-bg); }
  </style>
</head>

<body>

<header class="page-header">
  <h1 class="page-header__title">Profile</h1>
</header>

<main class="page-content">

  <div class="profile-card">
    <div class="identity-row">
      <div id="avatar" class="profile-avatar">?</div>
      <div>
        <div id="profileName" class="identity-name">Loading…</div>
        <div id="profileEmail" class="identity-email"></div>
      </div>
    </div>
  </div>

  <div class="profile-card">
    <div>Your IBAN</div>

    <input id="ibanInput" type="text" />
    <button id="saveIbanBtn">Save IBAN</button>
    <div id="ibanBanner" class="inline-banner"></div>
  </div>

  <button id="signOutBtn">Sign out</button>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<script>
  let currentUserId = null;

  const avatarEl = document.getElementById('avatar');
  const profileName = document.getElementById('profileName');
  const profileEmail = document.getElementById('profileEmail');
  const ibanInput = document.getElementById('ibanInput');
  const saveIbanBtn = document.getElementById('saveIbanBtn');
  const ibanBanner = document.getElementById('ibanBanner');
  const signOutBtn = document.getElementById('signOutBtn');

  function showBanner(el, type, msg) {
    el.textContent = msg;
    el.className = `inline-banner ${type}`;
    setTimeout(() => el.className = 'inline-banner', 3000);
  }

  saveIbanBtn.addEventListener('click', async () => {
    const iban = ibanInput.value.replace(/\s+/g, '');

    
    if (!iban || iban.length < 15) {
      showBanner(ibanBanner, 'error', 'Please enter a valid IBAN.');
      return;
    }

    const { error } = await sb
      .from('users')
      .update({ iban })
      .eq('id', currentUserId);

    if (error) {
      showBanner(ibanBanner, 'error', error.message);
    } else {
      showBanner(ibanBanner, 'success', 'Saved!');
    }
  });

  signOutBtn.addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = 'index.html';
  });

  (async () => {
    const { data: { session } } = await sb.auth.getSession();

    if (!session) {
      window.location.href = 'signin.html';
      return;
    }

    currentUserId = session.user.id;

    
    const { data: profile, error } = await sb
      .from('users')
      .select('full_name, email, iban')
      .eq('id', currentUserId)
      .single();

    if (error || !profile) {
      console.error(error);
      window.location.href = 'signin.html';
      return;
    }

  
    const firstName = profile.full_name?.split(' ')[0] || '';
    avatarEl.textContent = firstName ? firstName[0].toUpperCase() : '?';

    profileName.textContent = profile.full_name || '—';
    profileEmail.textContent = profile.email || session.user.email || '—';

    if (profile.iban) {
      ibanInput.value = profile.iban;
    }
  })();
</script>

</body>
</html>
